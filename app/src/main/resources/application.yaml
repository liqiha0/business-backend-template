spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        globally_quoted_identifiers: true
  data:
    web:
      pageable:
        one-indexed-parameters: true
        serialization-mode: via_dto
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
